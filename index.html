<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex bg-black">
        <div class="left">
            <div class="close">
                <img width="30" class="invert" src="close.svg" alt="">
            </div>
            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo"><img width="120" class="invert" src="logo.svg" alt="logo"></div>
                <ul>
                    <li><img class="invert" src="home.svg" alt="home">Home</li>
                    <li class="search"><img class="invert" src="search.svg" alt="home">Search</li>
                </ul>
            </div>
            <div class="library bg-grey rounded m-1 p-1">
                <!-- Your Library -->
                <h3>Your Library</h3>
                <div class="songlist">
                    <ul>

                    </ul>
                </div>
                <div class="footer">
                    <div><a href="https://www.spotify.com/  in-en/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/  in-en/safetyandprivacy/"><span>Safety &
                                PrivacyCenter</span></a></div>
                    <div><a href="https://www.spotify.com/  in-en/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/  in-en/legal/cookies-policy/   "><span>Cookies</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/  in-en/legal/privacy-policy/   #s3"><span>AboutAds</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/  in-en/accessibility/"><span>Accessibility</ span></a></div>
                </div>
            </div>
        </div>
        <div class="right bg-grey rounded">
            <div class="header">
                <div class="hamburgercontainer">
                    <img width="40" class="invert hamburger" src="hamburger.svg" alt="">
                </div>
                <div class="buttons">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>
            <div class="albums">
                <h1>Popular Albums</h1>
                <div class="cardcontainer">
                    
                </div>
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle">

                        </div>
                    </div>
                    <div class="abovebar">
                        <div class="songinfo">

                        </div>
                        <div class="songbuttons">
                            <img width="35" id="previous" src="previous.svg" alt="" srcset="">
                            <img width="35" id="play" src="play.svg" alt="" srcset="">
                            <img width="35" id="next" src="next.svg" alt="" srcset="">
                        </div>
                        <div class="timevol">
                            <div class="songtime">

                            </div>
                            <div class="volume">
                                <img width="25" src="volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
